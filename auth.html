<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EditingLabs</title>
    <meta name="description" content="Masuk atau daftar akun EditingLabs untuk melanjutkan kelas videografi dan editing dengan pengalaman yang cepat dan rapi.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sign In - EditingLabs">
    <meta property="og:description" content="Masuk atau daftar akun EditingLabs untuk melanjutkan kelas videografi dan editing dengan pengalaman yang cepat dan rapi.">
    <meta property="og:image" content="https://editinglabs.id/assets/img/hero-edit.png">
    <meta property="og:url" content="https://editinglabs.id/auth.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sign In - EditingLabs">
    <meta name="twitter:description" content="Masuk atau daftar akun EditingLabs untuk melanjutkan kelas videografi dan editing dengan pengalaman yang cepat dan rapi.">
    <meta name="twitter:image" content="https://editinglabs.id/assets/img/hero-edit.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <svg class="nav-logo-icon" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="11" y="2" width="10" height="3" rx="1.5" fill="#00A5B5"/>
                    <path d="M13 5 H19 V12 L28 26 A3 3 0 0 1 25 29 H7 A3 3 0 0 1 4 26 L13 12 V5 Z" fill="#00A5B5"/>
                    <path d="M15 16.5 L19.5 20.5 L15 24.5 Z" fill="#000000" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" />
                </svg>
                <div>Editing<span>Labs</span></div>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="index.html#kelas">Course</a></li>
                    <li><a href="auth.html">Akun</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-section">
            <div class="container auth-shell">
                <div class="auth-head">
                    <p class="hero-tag">Account</p>
                    <h1 id="auth-heading">Welcome back</h1>
                    <p id="auth-subheading" class="auth-subtitle">Sign in to continue your learning flow.</p>
                </div>

                <div class="auth-card">
                    <div class="auth-toggle" role="tablist" aria-label="Choose authentication mode">
                        <button type="button" id="tab-login" class="auth-tab active" data-mode="login" role="tab" aria-controls="login-form" aria-selected="true">Sign In</button>
                        <button type="button" id="tab-register" class="auth-tab" data-mode="register" role="tab" aria-controls="register-form" aria-selected="false">Sign Up</button>
                    </div>

                    <p id="auth-message" class="auth-message" aria-live="polite"></p>

                    <form id="login-form" class="auth-form" role="tabpanel" aria-labelledby="tab-login" novalidate>
                        <label for="login-email">Email</label>
                        <input id="login-email" name="email" type="email" required autocomplete="email" aria-describedby="auth-message" placeholder="you@email.com">

                        <label for="login-password">Password</label>
                        <input id="login-password" name="password" type="password" required autocomplete="current-password" aria-describedby="auth-message" placeholder="Enter your password">

                        <button class="btn-cta" type="submit">Sign In</button>
                    </form>

                    <form id="register-form" class="auth-form hidden" role="tabpanel" aria-labelledby="tab-register" novalidate>
                        <label for="register-name">Full Name</label>
                        <input id="register-name" name="name" type="text" required autocomplete="name" aria-describedby="auth-message" placeholder="Your name">

                        <label for="register-email">Email</label>
                        <input id="register-email" name="email" type="email" required autocomplete="email" aria-describedby="auth-message" placeholder="you@email.com">

                        <label for="register-password">Password</label>
                        <input id="register-password" name="password" type="password" required autocomplete="new-password" aria-describedby="auth-message" placeholder="At least 6 characters">

                        <button class="btn-cta" type="submit">Create Account</button>
                    </form>

                    <p class="auth-note">Demo mode: session is stored locally in your browser.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h4>Editing<span>Labs</span></h4>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="auth.js"></script>
</body>
</html>
